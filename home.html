<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TwoDiskGarage Home</title>
    <link rel="stylesheet" href="./home.css" />
  </head>
  <body>
    <iframe class="home-main-frame" src="./index.html" title="TwoDiskGarage index"></iframe>

    <main class="home-stage" aria-label="TwoDiskGarage home">
      <h1 class="logo-mark" aria-label="Two Disk Garage">
        <span class="logo-line" aria-label="Two">
          <span class="logo-letter" data-letter="T" tabindex="0">T</span>
          <span class="logo-letter" data-letter="W" tabindex="0">W</span>
          <span class="logo-letter" data-letter="O" tabindex="0">O</span>
        </span>
        <span class="logo-line" aria-label="Disk">
          <span class="logo-letter" data-letter="D" tabindex="0">D</span>
          <span class="logo-letter" data-letter="I" tabindex="0">I</span>
          <span class="logo-letter" data-letter="S" tabindex="0">S</span>
          <span class="logo-letter" data-letter="K" tabindex="0">K</span>
        </span>
        <span class="logo-line" aria-label="Garage">
          <span class="logo-letter" data-letter="G" tabindex="0">G</span>
          <span class="logo-letter" data-letter="A" tabindex="0">A</span>
          <span class="logo-letter" data-letter="R" tabindex="0">R</span>
          <span class="logo-letter" data-letter="A" tabindex="0">A</span>
          <span class="logo-letter" data-letter="G" tabindex="0">G</span>
          <span class="logo-letter" data-letter="E" tabindex="0">E</span>
        </span>
      </h1>
    </main>

    <script src="./home.js"></script>
  </body>
</html>
